services:
  # ─── Base de données PostgreSQL ───────────────
  postgres:
    image: postgres:16-alpine
    container_name: supptic_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: supptic
      POSTGRES_PASSWORD: supptic_secret
      POSTGRES_DB: supptic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supptic -d supptic_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
